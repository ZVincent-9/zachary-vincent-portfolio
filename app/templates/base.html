<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zachary Vincent | Software Engineer</title>

    <!-- Tailwind CDN (we'll switch to proper build later) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <script>
        // Tailwind script to support dark mode
        tailwind.config = {
            content: ["./**/*.html"],
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
</head>

<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen transition-colors duration-300">

    <!-- Fixed Navbar - Always Hamburger -->
    <nav
        class="fixed top-0 left-0 right-0 bg-white/90 dark:bg-zinc-950/90 backdrop-blur-lg border-b border-zinc-200 dark:border-zinc-800 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo -->
            <a href="/" class="text-2xl font-bold tracking-tight hover:text-emerald-600 transition-colors">
                Zachary Vincent
            </a>

            <!-- Right side: Theme Toggle + Hamburger -->
            <div class="flex items-center gap-4">
                <!-- Theme Toggle -->
                <button id="theme-toggle"
                    class="p-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                    <span id="theme-icon" class="text-xl">🌙</span>
                </button>

                <!-- Hamburger (always visible) -->
                <button id="hamburger"
                    class="p-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu (now used on all screen sizes) -->
        <div id="mobile-menu" class="hidden bg-white dark:bg-zinc-950 border-t border-zinc-200 dark:border-zinc-800">
            <div class="px-6 py-8 flex flex-col gap-6 text-lg font-medium">
                <a href="#home"
                    class="py-2 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Home</a>
                <a href="#about"
                    class="py-2 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">About</a>
                <a href="#projects"
                    class="py-2 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Projects</a>
                <a href="#skills"
                    class="py-2 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Skills</a>
                <a href="#contact"
                    class="py-2 hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="pt-20">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer (simple for now) -->
    <footer class="bg-zinc-100 dark:bg-zinc-900 py-8 mt-20">
        <div class="max-w-6xl mx-auto px-6 text-center text-sm text-zinc-500 dark:text-zinc-400">
            © 2026 Zachary Vincent. Built with Flask + Tailwind.
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
