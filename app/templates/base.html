<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zachary Vincent | Software Engineer</title>

    <!-- Tailwind CDN (we'll switch to proper build later) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Your custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <script>
        // Tailwind script to support dark mode
        tailwind.config = {
            content: ["./**/*.html"],
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
</head>

<body class="bg-zinc-50 dark:bg-zinc-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

    <!-- Fixed Navbar -->
    <nav
        class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-zinc-950/95 backdrop-blur-lg border-b border-zinc-200 dark:border-zinc-800 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo -->
            <a href="/" class="text-2xl font-bold tracking-tight hover:text-emerald-600 transition-colors">
                Zachary Vincent
            </a>

            <!-- Right side controls -->
            <div class="flex items-center gap-4">
                <!-- Theme Toggle -->
                <button id="theme-toggle"
                    class="p-2.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                    <span id="theme-icon" class="text-2xl">🌙</span>
                </button>

                <!-- Hamburger Button -->
                <button id="hamburger"
                    class="p-2.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors focus:outline-none">
                    <svg id="hamburger-icon" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Dropdown Menu -->
        <div id="dropdown-menu" class="hidden absolute right-6 top-20 w-64 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-3xl shadow-2xl py-6 px-6 z-50 
                transition-all duration-300 origin-top-right">

            <div class="flex flex-col gap-2 text-base font-medium">
                <a href="#home"
                    class="dropdown-link px-5 py-3.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">Home</a>
                <a href="#about"
                    class="dropdown-link px-5 py-3.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">About</a>
                <a href="#projects"
                    class="dropdown-link px-5 py-3.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">Projects</a>
                <a href="#skills"
                    class="dropdown-link px-5 py-3.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">Skills</a>
                <a href="#contact"
                    class="dropdown-link px-5 py-3.5 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">Contact</a>
            </div>

            <!-- Optional subtle divider + resume link -->
            <div class="my-4 border-t border-zinc-200 dark:border-zinc-700"></div>
            <a href="/static/resume.pdf" target="_blank"
                class="flex items-center gap-3 px-5 py-3.5 text-emerald-600 dark:text-emerald-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 rounded-2xl transition-colors">
                <span>📄</span>
                <span>Download Resume</span>
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="pt-20 bg-transparent dark:bg-transparent">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="dark:bg-zinc-950 py-12 border-t border-zinc-200 dark:border-zinc-800">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">

                <!-- Copyright -->
                <div class="text-zinc-500 dark:text-zinc-400 text-sm">
                    © 2026 Zachary Vincent. Built with Flask + Tailwind CSS.
                </div>

                <!-- Social Links -->
                <div class="flex flex-wrap gap-6 text-sm">
                    <a href="mailto:Zac9Vincent@hotmail.com"
                        class="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">
                        Zac9Vincent@hotmail.com
                    </a>
                    <a href="https://linkedin.com/in/zachary-vincent-647381153" target="_blank"
                        class="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">
                        LinkedIn
                    </a>
                    <a href="https://github.com/ZVincent-9" target="_blank"
                        class="hover:text-emerald-600 dark:hover:text-emerald-400 transition-colors">
                        GitHub
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
